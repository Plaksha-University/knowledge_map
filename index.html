<style>
#cg-wrap{position:relative;width:100%}
#cg{width:100%;display:block;cursor:default}
#ct{position:absolute;display:none;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:10px 12px;font-size:12px;max-width:280px;pointer-events:none;z-index:20;line-height:1.5;color:var(--color-text-primary)}
.ct-title{font-weight:500;font-size:13px;margin-bottom:1px}
.ct-name{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;font-style:italic}
.ct-sub{color:var(--color-text-secondary);font-size:11px}
.ct-row{display:flex;gap:8px;align-items:center;margin-top:5px}
.ct-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;flex:1;overflow:hidden}
.ct-fill{height:100%;border-radius:2px}
.ct-sep{border-top:0.5px solid var(--color-border-tertiary);margin-top:6px;padding-top:6px}
.ct-c{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.ct-pair{margin-bottom:2px}
.ct-peer{font-size:10px;font-family:var(--font-mono,monospace)}
.ct-peername{font-size:10px;color:var(--color-text-secondary);font-style:italic}
#cg-controls{display:flex;flex-wrap:wrap;gap:10px 20px;padding:10px 14px 12px;border-top:0.5px solid var(--color-border-tertiary);align-items:center}
.ctrl-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:200px}
.ctrl-label{font-size:11px;color:var(--color-text-secondary);display:flex;justify-content:space-between;align-items:center}
.ctrl-label span{font-weight:500;color:var(--color-text-primary)}
#cg-meta{padding:6px 14px;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:16px;align-items:center}
#cg-leg{display:flex;flex-wrap:wrap;gap:6px 8px;padding:8px 14px 12px;border-top:0.5px solid var(--color-border-tertiary)}
.li{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;transition:all .15s;font-size:11px;user-select:none}
.li:hover{border-color:var(--color-border-secondary)}
.li.active{border-color:var(--color-border-primary)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.clear-btn{margin-left:auto;font-size:11px;color:var(--color-text-secondary);cursor:pointer;padding:2px 8px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:none;line-height:1.6}
.clear-btn:hover{background:var(--color-background-secondary)}
</style>

</div>

</div>

const DEPT_COLORS={FM:'#1D9E75',CS:'#378ADD',BE:'#639922',AI:'#7F77DD',RO:'#D85A30',EC:'#BA7517',DS:'#0F6E56',HS:'#D4537E',IL:'#888780',BU:'#EF9F27',ME:'#185FA5',CP:'#E24B4A'};
const ALL_DEPTS=Object.keys(DEPT_COLORS);
function deptOf(id){const m=id.match(/^([A-Z]+)/);return m?m[1]:'XX';}
function colorOf(id){return DEPT_COLORS[deptOf(id)]||'#888';}

const cv=document.getElementById('cg');
const cx=cv.getContext('2d');
const tip=document.getElementById('ct');
const wrap=document.getElementById('cg-wrap');

let NP={},W=0,H=760,dpr=window.devicePixelRatio||1;
let hovN=null,hovE=null;
const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
let threshold=0.18,selDepts=new Set(),activeEdges=[];

const connMap={};
GD.nodes.forEach(n=>{connMap[n.id]=[];});
GD.edges.forEach((e,i)=>{e._i=i;connMap[e.source].push(e);connMap[e.target].push(e);});

function computeActiveEdges(){activeEdges=GD.edges.filter(e=>e.avg>=threshold);}

function initLayout(){
  W=cv.clientWidth;
  const L=62,R=62,T=78,B=30,UW=W-L-R,UH=H-T-B,cs=UW/6;
  const bySem={};for(let i=1;i<=7;i++)bySem[i]=[];
  GD.nodes.forEach(n=>bySem[n.semester].push(n.id));
  NP={};
  for(let s=1;s<=7;s++){
    const ids=bySem[s],n=ids.length,x=L+(s-1)*cs;
    const sp=Math.min(40,UH/Math.max(n-1,1)),span=(n-1)*sp,sy=T+(UH-span)/2;
    ids.forEach((id,i)=>{NP[id]={x,y:sy+i*sp,s};});
  }
}

function initCv(){
  W=cv.clientWidth;cv.width=W*dpr;cv.height=H*dpr;
  cv.style.height=H+'px';cx.scale(dpr,dpr);initLayout();
}

const NR=11;
function cpOf(p0,p3){const dx=p3.x-p0.x;return{cp1:{x:p0.x+dx*.42,y:p0.y},cp2:{x:p3.x-dx*.42,y:p3.y}};}
function ptBez(t,p0,c1,c2,p3){const m=1-t;return{x:m*m*m*p0.x+3*m*m*t*c1.x+3*m*t*t*c2.x+t*t*t*p3.x,y:m*m*m*p0.y+3*m*m*t*c1.y+3*m*t*t*c2.y+t*t*t*p3.y};}
function distEdge(mx,my,e){
  const p0=NP[e.source],p3=NP[e.target];if(!p0||!p3)return 999;
  const{cp1,cp2}=cpOf(p0,p3);let md=999;
  for(let t=0;t<=1;t+=0.06){const p=ptBez(t,p0,cp1,cp2,p3);const d=Math.hypot(mx-p.x,my-p.y);if(d<md)md=d;}
  return md;
}
function eColor(avg){const t=Math.min(1,Math.max(0,avg/0.4));if(t<0.5){const f=t*2;return`rgb(${Math.round(70+f*80)},${Math.round(120+f*80)},${Math.round(210-f*30)})`;}const f=(t-.5)*2;return`rgb(${Math.round(150+f*80)},${Math.round(200+f*30)},${Math.round(180-f*80)})`;}

function getDeptHighlight(){
  if(selDepts.size===0)return null;
  const hlNodes=new Set(),hlEdges=new Set();
  GD.nodes.forEach(n=>{if(selDepts.has(deptOf(n.id)))hlNodes.add(n.id);});
  activeEdges.forEach(e=>{if(selDepts.has(deptOf(e.source))||selDepts.has(deptOf(e.target))){hlNodes.add(e.source);hlNodes.add(e.target);hlEdges.add(e._i);}});
  return{hlNodes,hlEdges};
}

function draw(){
  cx.clearRect(0,0,W,H);
  const lc=isDark?'rgba(255,255,255,0.055)':'rgba(0,0,0,0.055)';
  const sc=isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.016)';
  const L=62,cs=(W-124)/6;
  for(let s=1;s<=7;s++){if(s%2===0){cx.fillStyle=sc;cx.fillRect(L+(s-1)*cs-cs/2,0,cs,H);}}
  for(let s=1;s<=7;s++){
    const x=L+(s-1)*cs;
    cx.fillStyle=isDark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.4)';
    cx.font='500 11px var(--font-sans,system-ui)';cx.textAlign='center';cx.fillText('Sem '+s,x,28);
    cx.strokeStyle=lc;cx.lineWidth=0.5;cx.beginPath();cx.moveTo(x,38);cx.lineTo(x,H-15);cx.stroke();
  }
  const dh=getDeptHighlight();
  let hlN=null,hlE=null;
  if(hovN){hlN=new Set([hovN]);hlE=new Set();connMap[hovN].forEach(e=>{if(activeEdges.includes(e)){hlE.add(e._i);hlN.add(e.source);hlN.add(e.target);}});}
  else if(hovE){hlN=new Set([hovE.source,hovE.target]);hlE=new Set([hovE._i]);}
  activeEdges.forEach(e=>{
    const p0=NP[e.source],p3=NP[e.target];if(!p0||!p3)return;
    const{cp1,cp2}=cpOf(p0,p3);
    const hHL=hlE?hlE.has(e._i):false,dHL=dh?dh.hlEdges.has(e._i):false;
    const hasHover=hovN||hovE,hasDept=dh!==null;
    let al,lw,col;
    if(hasHover){if(hHL){al=0.9;lw=1.5+e.avg*2.2;col=eColor(e.avg);}else{al=hasDept?(dHL?0.06:0.015):0.02;lw=0.35;col=isDark?'#6a7090':'#9090aa';}}
    else if(hasDept){if(dHL){al=0.75;lw=1.2+e.avg*2;col=eColor(e.avg);}else{al=0.018;lw=0.3;col=isDark?'#6a7090':'#9090aa';}}
    else{al=0.04+e.avg*.6;lw=0.4+e.avg*1.8;col=isDark?'#6a7090':'#9090aa';}
    cx.globalAlpha=al;cx.strokeStyle=col;cx.lineWidth=lw;
    cx.beginPath();cx.moveTo(p0.x,p0.y);cx.bezierCurveTo(cp1.x,cp1.y,cp2.x,cp2.y,p3.x,p3.y);cx.stroke();cx.globalAlpha=1;
  });
  GD.nodes.forEach(n=>{
    const p=NP[n.id];if(!p)return;
    const color=colorOf(n.id),isHov=hovN===n.id;
    const hasHover=hovN||hovE,hasDept=dh!==null;
    const inHHL=hlN?hlN.has(n.id):false,inDHL=dh?dh.hlNodes.has(n.id):false;
    const isSelDept=selDepts.has(deptOf(n.id));
    const nodeAl=hasHover?inHHL?1:0.12:hasDept?inDHL?1:0.1:1;
    cx.globalAlpha=nodeAl;
    const r=isHov?NR+2:NR;
    cx.beginPath();cx.arc(p.x,p.y,r,0,Math.PI*2);
    cx.fillStyle=color+(isDark?'25':'1e');cx.fill();
    cx.strokeStyle=color;cx.lineWidth=isSelDept&&hasDept?2:isHov?1.8:0.8;cx.stroke();
    cx.fillStyle=nodeAl>0.3?(isDark?'#d0cec4':'#1a1a1a'):(isDark?'#333':'#ddd');
    cx.font=(isHov||isSelDept&&hasDept?'500':'400')+' 8.5px var(--font-mono,monospace)';
    cx.textAlign='center';cx.fillText(n.id,p.x,p.y+3.5);cx.globalAlpha=1;
  });
}

function pct(v,max){return Math.round(Math.min(1,v/max)*100)+'%';}
function bar(v,max,color){return`<div class="ct-bar"><div class="ct-fill" style="width:${pct(v,max)};background:${color}"></div></div>`;}

function showNTip(id){
  const p=NP[id],color=colorOf(id);
  const s=GD.nodes.find(n=>n.id===id)?.semester;
  const conns=connMap[id].filter(e=>activeEdges.includes(e));
  const top=[...conns].sort((a,b)=>b.avg-a.avg).slice(0,5);
  let h=`<div class="ct-title" style="color:${color}">${id}</div>`;
  h+=`<div class="ct-name">${name(id)}</div>`;
  h+=`<div class="ct-sub">Semester ${s} · ${deptOf(id)} · ${conns.length} visible connections</div>`;
  if(top.length){
    h+=`<div class="ct-sep"><div style="font-size:10px;color:var(--color-text-secondary,#888);margin-bottom:5px">Top connections</div>`;
    top.forEach(e=>{
      const oth=e.source===id?e.target:e.source;
      h+=`<div style="margin-bottom:5px">`;
      h+=`<div class="ct-row" style="margin-top:0"><span class="ct-peer" style="min-width:58px;color:${colorOf(oth)}">${oth}</span>${bar(e.avg,.52,eColor(e.avg))}<span style="font-size:10px;min-width:34px;text-align:right">${e.avg.toFixed(3)}</span></div>`;
      h+=`<div class="ct-peername" style="padding-left:2px;margin-top:1px">${name(oth)}</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  tip.innerHTML=h;posTip(p.x,p.y);
}

function showETip(e){
  const sc=colorOf(e.source),tc=colorOf(e.target),ec=eColor(e.avg);
  const sp=NP[e.source]?.s||'',tp=NP[e.target]?.s||'';
  let h=`<div class="ct-title">`;
  h+=`<span style="color:${sc}">${e.source}</span><span style="color:var(--color-text-secondary,#888)"> → </span><span style="color:${tc}">${e.target}</span>`;
  h+=`</div>`;
  h+=`<div class="ct-name" style="margin-bottom:4px">`;
  h+=`<span style="color:${sc}">${name(e.source)}</span><span style="color:var(--color-text-secondary,#888)"> → </span><span style="color:${tc}">${name(e.target)}</span>`;
  h+=`</div>`;
  h+=`<div class="ct-sub">Sem ${sp} → Sem ${tp}</div>`;
  h+=`<div class="ct-row" style="margin-top:6px"><span style="font-size:11px;min-width:90px;color:var(--color-text-secondary,#888)">Avg similarity</span>${bar(e.avg,.52,ec)}<span style="font-weight:500;min-width:36px;text-align:right">${e.avg.toFixed(3)}</span></div>`;
  h+=`<div class="ct-row"><span style="font-size:11px;min-width:90px;color:var(--color-text-secondary,#888)">Max similarity</span>${bar(e.max,1,ec)}<span style="font-size:11px;min-width:36px;text-align:right">${e.max.toFixed(2)}</span></div>`;
  if(e.concepts?.length){
    h+=`<div class="ct-sep"><div style="font-size:10px;color:var(--color-text-secondary,#888);margin-bottom:3px">Shared concepts</div>`;
    [...new Set(e.concepts)].slice(0,2).forEach(c=>{h+=`<div class="ct-c">· ${c}</div>`;});
    h+=`</div>`;
  }
  tip.innerHTML=h;
  const p0=NP[e.source],p3=NP[e.target];
  posTip((p0.x+p3.x)/2,(p0.y+p3.y)/2);
}

function posTip(lx,ly){
  tip.style.display='block';const tw=280,th=210;
  let tx=lx+18,ty=ly-22;
  if(tx+tw>W-8)tx=lx-tw-18;if(ty+th>H-8)ty=H-th-8;if(ty<8)ty=8;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}

function updateMeta(){
  document.getElementById('edge-count').textContent=activeEdges.length+' connections shown';
  const clearBtn=document.getElementById('clear-btn'),hint=document.getElementById('dept-hint');
  if(selDepts.size>0){clearBtn.style.display='';hint.textContent=[...selDepts].join(', ')+' highlighted';}
  else{clearBtn.style.display='none';hint.textContent='Click departments to highlight';}
}

document.getElementById('thresh').addEventListener('input',function(){
  threshold=parseInt(this.value)/100;
  document.getElementById('thresh-val').textContent=threshold.toFixed(2);
  computeActiveEdges();updateMeta();draw();
});

const leg=document.getElementById('cg-leg');
ALL_DEPTS.forEach(d=>{
  const el=document.createElement('div');el.className='li';el.dataset.dept=d;
  el.innerHTML=`<div class="ld" style="background:${DEPT_COLORS[d]}"></div><span>${d}</span>`;
  el.addEventListener('click',()=>{
    if(selDepts.has(d)){selDepts.delete(d);el.classList.remove('active');}
    else{selDepts.add(d);el.classList.add('active');}
    hovN=null;hovE=null;tip.style.display='none';updateMeta();draw();
  });
  leg.appendChild(el);
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  selDepts.clear();document.querySelectorAll('.li.active').forEach(el=>el.classList.remove('active'));updateMeta();draw();
});

cv.addEventListener('mousemove',ev=>{
  const r=cv.getBoundingClientRect(),lx=ev.clientX-r.left,ly=ev.clientY-r.top;
  let fn=null;
  for(const n of GD.nodes){const p=NP[n.id];if(!p)continue;if(Math.hypot(lx-p.x,ly-p.y)<=NR+3){fn=n.id;break;}}
  let fe=null;
  if(!fn){let md=8;for(const e of activeEdges){const d=distEdge(lx,ly,e);if(d<md){md=d;fe=e;}}}
  const ch=fn!==hovN||fe!==hovE;hovN=fn;hovE=fe;
  if(fn)showNTip(fn);else if(fe)showETip(fe);else tip.style.display='none';
  if(ch)draw();
});
cv.addEventListener('mouseleave',()=>{hovN=null;hovE=null;tip.style.display='none';draw();});

computeActiveEdges();initCv();draw();updateMeta();
window.addEventListener('resize',()=>{cx.setTransform(1,0,0,1,0,0);initCv();draw();});
</script>
