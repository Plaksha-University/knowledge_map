<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Similarity Graph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#d0cec4}}
#app{max-width:1100px;margin:0 auto;padding:16px}
h1{font-size:16px;font-weight:500;margin-bottom:4px;color:#1a1a1a}
@media(prefers-color-scheme:dark){h1{color:#d0cec4}}
.sub{font-size:12px;color:#888;margin-bottom:12px}
#cg-wrap{position:relative;width:100%;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;overflow:hidden}
@media(prefers-color-scheme:dark){#cg-wrap{border-color:rgba(255,255,255,0.08)}}
#cg{width:100%;display:block;cursor:default}
#ct{position:absolute;display:none;background:#fff;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;font-size:12px;max-width:260px;pointer-events:none;z-index:20;line-height:1.5;color:#1a1a1a}
@media(prefers-color-scheme:dark){#ct{background:#242424;border-color:rgba(255,255,255,0.15);color:#d0cec4}}
.ct-title{font-weight:500;font-size:13px;margin-bottom:3px}
.ct-sub{color:#888;font-size:11px}
.ct-row{display:flex;gap:8px;align-items:center;margin-top:5px}
.ct-bar{height:4px;background:rgba(0,0,0,0.08);border-radius:2px;flex:1;overflow:hidden}
@media(prefers-color-scheme:dark){.ct-bar{background:rgba(255,255,255,0.1)}}
.ct-fill{height:100%;border-radius:2px}
.ct-sep{border-top:0.5px solid rgba(0,0,0,0.1);margin-top:6px;padding-top:6px}
@media(prefers-color-scheme:dark){.ct-sep{border-color:rgba(255,255,255,0.1)}}
.ct-c{font-size:10px;color:#888;margin-top:2px}
.ct-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;margin-top:3px;font-weight:600;letter-spacing:0.03em}
#cg-controls{display:flex;flex-wrap:wrap;gap:10px 20px;padding:10px 14px 12px;border-top:0.5px solid rgba(0,0,0,0.08);align-items:center}
@media(prefers-color-scheme:dark){#cg-controls{border-color:rgba(255,255,255,0.08)}}
.ctrl-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:200px}
.ctrl-label{font-size:11px;color:#888;display:flex;justify-content:space-between;align-items:center}
.ctrl-label span{font-weight:500;color:#1a1a1a}
@media(prefers-color-scheme:dark){.ctrl-label span{color:#d0cec4}}
#cg-meta{padding:6px 14px;font-size:11px;color:#888;border-top:0.5px solid rgba(0,0,0,0.08);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
@media(prefers-color-scheme:dark){#cg-meta{border-color:rgba(255,255,255,0.08)}}
#cg-leg{display:flex;flex-wrap:wrap;gap:8px 10px;padding:10px 14px 12px;border-top:0.5px solid rgba(0,0,0,0.08);align-items:flex-start}
@media(prefers-color-scheme:dark){#cg-leg{border-color:rgba(255,255,255,0.08)}}
.major-btn{display:flex;flex-direction:column;gap:4px;padding:7px 12px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none;background:rgba(0,0,0,0.03);min-width:90px}
@media(prefers-color-scheme:dark){.major-btn{background:rgba(255,255,255,0.05)}}
.major-btn:hover{border-color:rgba(0,0,0,0.2)}
@media(prefers-color-scheme:dark){.major-btn:hover{border-color:rgba(255,255,255,0.2)}}
.major-btn.active{border-color:rgba(0,0,0,0.45);background:rgba(0,0,0,0.06)}
@media(prefers-color-scheme:dark){.major-btn.active{border-color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.09)}}
.major-name{font-size:12px;font-weight:600;color:#1a1a1a}
@media(prefers-color-scheme:dark){.major-name{color:#d0cec4}}
.clear-btn{font-size:11px;color:#888;cursor:pointer;padding:2px 8px;border:0.5px solid rgba(0,0,0,0.2);border-radius:4px;background:none;line-height:1.6;margin-left:auto}
@media(prefers-color-scheme:dark){.clear-btn{border-color:rgba(255,255,255,0.15)}}
.clear-btn:hover{background:rgba(0,0,0,0.04)}
@media(prefers-color-scheme:dark){.clear-btn:hover{background:rgba(255,255,255,0.06)}}
input[type=range]{width:100%;accent-color:#378ADD}
.ct-name{font-size:11px;color:#888;margin-bottom:3px;font-style:italic}
.ct-peer{font-size:10px;font-family:monospace}
.ct-peername{font-size:10px;color:#888;font-style:italic;margin-top:1px;padding-left:2px}
</style>
</head>
<body>
<div id="app">
  <h1>Course Similarity Graph</h1>
  <p class="sub">77 courses · 7 semesters · connections between consecutive semesters only · hover nodes or edges for details</p>

    </div>
    <label id="edge-toggle-wrap" style="display:flex;align-items:center;gap:7px;font-size:11px;color:#888;cursor:pointer;user-select:none;padding:4px 0">
      <input type="checkbox" id="edge-toggle" style="accent-color:#378ADD;width:13px;height:13px;cursor:pointer">
      <span>Show connections within major</span>
    </label>
  </div>
  <div id="cg-meta">
    <span id="edge-count">— edges shown</span>
    <span id="dept-hint">Click a major to highlight its curriculum</span>
    <button class="clear-btn" id="clear-btn" style="display:none">Clear filter</button>
  </div>
  <div id="cg-leg"></div>
</div>

  "AI4101":{CSAI:"PEC",DSEB:"PEC",RAS:"PEC"},
  "BE3103":{BSE:"PEC"},
  "CS4101":{CSAI:"PEC"},
  "CS4102":{CSAI:"PEC"},
  "DS4101":{BSE:"OEC",CSAI:"PEC",DSEB:"OEC",RAS:"OEC"},
  "DS4102":{CSAI:"OEC",DSEB:"PEC"},
  "RO4101":{CSAI:"OEC",RAS:"PEC"}
};

// Dept colors (used for nodes in default view)
const DEPT_COLORS={FM:'#1D9E75',CS:'#378ADD',BE:'#639922',AI:'#7F77DD',RO:'#D85A30',EC:'#BA7517',DS:'#0F6E56',HS:'#D4537E',IL:'#888780',BU:'#EF9F27',ME:'#185FA5',CP:'#E24B4A'};
function deptOf(id){const m=id.match(/^([A-Z]+)/);return m?m[1]:'XX';}
function colorOf(id){return DEPT_COLORS[deptOf(id)]||'#888';}

// Course type colors (used for nodes when a major is selected)
const TYPE_COLORS={FM:'#888780',PCC:'#1a7abf',PEC:'#9b59b6',OEC:'#e67e22',OELS:'#c0392b'};
const TYPE_LABELS={FM:'Freshmore',PCC:'Program Core',PEC:'Program Elective',OEC:'Open Elective',OELS:'Mandatory'};

const ALL_MAJORS=['CSAI','DSEB','RAS','BSE'];

const cv=document.getElementById('cg');
const cx=cv.getContext('2d');
const tip=document.getElementById('ct');

let NP={},W=0,H=760,dpr=window.devicePixelRatio||1;
let hovN=null,hovE=null;
const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
let threshold=0.18,selMajors=new Set(),activeEdges=[],showEdges=false;

const connMap={};
GD.nodes.forEach(n=>{connMap[n.id]=[];});
GD.edges.forEach((e,i)=>{e._i=i;connMap[e.source].push(e);connMap[e.target].push(e);});

function computeActiveEdges(){activeEdges=GD.edges.filter(e=>e.avg>=threshold);}

function initLayout(){
  W=cv.clientWidth;
  const L=62,R=62,T=78,B=30,UW=W-L-R,UH=H-T-B,cs=UW/6;
  const bySem={};for(let i=1;i<=7;i++)bySem[i]=[];
  GD.nodes.forEach(n=>bySem[n.semester].push(n.id));
  NP={};
  for(let s=1;s<=7;s++){
    const ids=bySem[s],n=ids.length,x=L+(s-1)*cs;
    const sp=Math.min(40,UH/Math.max(n-1,1)),span=(n-1)*sp,sy=T+(UH-span)/2;
    ids.forEach((id,i)=>{NP[id]={x,y:sy+i*sp,s};});
  }
}

function initCv(){
  W=cv.clientWidth;cv.width=W*dpr;cv.height=H*dpr;
  cv.style.height=H+'px';cx.scale(dpr,dpr);initLayout();
}

const NR=11;
function cpOf(p0,p3){const dx=p3.x-p0.x;return{cp1:{x:p0.x+dx*.42,y:p0.y},cp2:{x:p3.x-dx*.42,y:p3.y}};}
function ptBez(t,p0,c1,c2,p3){const m=1-t;return{x:m*m*m*p0.x+3*m*m*t*c1.x+3*m*t*t*c2.x+t*t*t*p3.x,y:m*m*m*p0.y+3*m*m*t*c1.y+3*m*t*t*c2.y+t*t*t*p3.y};}
function distEdge(mx,my,e){
  const p0=NP[e.source],p3=NP[e.target];if(!p0||!p3)return 999;
  const{cp1,cp2}=cpOf(p0,p3);let md=999;
  for(let t=0;t<=1;t+=0.06){const p=ptBez(t,p0,cp1,cp2,p3);const d=Math.hypot(mx-p.x,my-p.y);if(d<md)md=d;}
  return md;
}
function eColor(avg){const t=Math.min(1,Math.max(0,avg/0.4));if(t<0.5){const f=t*2;return`rgb(${Math.round(70+f*80)},${Math.round(120+f*80)},${Math.round(210-f*30)})`;}const f=(t-.5)*2;return`rgb(${Math.round(150+f*80)},${Math.round(200+f*30)},${Math.round(180-f*80)})`;}

// For a node, get highlight membership given active majors
function getMajorHighlight(){
  if(selMajors.size===0)return null;
  // hlNodes: Map<id, typeColor>; hlEdges: Set<edgeIdx> (within-major); dimEdges: Set<edgeIdx> (touch at least one non-hl node)
  const hlNodes=new Map(),hlEdges=new Set(),dimEdges=new Set();
  GD.nodes.forEach(n=>{
    const id=n.id;
    for(const m of selMajors){
      const t=COURSE_MAJORS[id]?.[m];
      if(t){if(!hlNodes.has(id))hlNodes.set(id,TYPE_COLORS[t]||colorOf(id));break;}
    }
  });
  activeEdges.forEach(e=>{
    const sIn=hlNodes.has(e.source),tIn=hlNodes.has(e.target);
    if(sIn&&tIn){if(showEdges)hlEdges.add(e._i);}
    else dimEdges.add(e._i);
  });
  return{hlNodes,hlEdges,dimEdges};
}

function draw(){
  cx.clearRect(0,0,W,H);
  const lc=isDark?'rgba(255,255,255,0.055)':'rgba(0,0,0,0.055)';
  const sc=isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.016)';
  const L=62,cs=(W-124)/6;
  for(let s=1;s<=7;s++){if(s%2===0){cx.fillStyle=sc;cx.fillRect(L+(s-1)*cs-cs/2,0,cs,H);}}
  for(let s=1;s<=7;s++){
    const x=L+(s-1)*cs;
    cx.fillStyle=isDark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.4)';
    cx.font='500 11px system-ui,-apple-system,sans-serif';cx.textAlign='center';cx.fillText('Sem '+s,x,28);
    cx.strokeStyle=lc;cx.lineWidth=0.5;cx.beginPath();cx.moveTo(x,38);cx.lineTo(x,H-15);cx.stroke();
  }
  const mh=getMajorHighlight();
  let hlN=null,hlE=null;
  if(hovN){hlN=new Set([hovN]);hlE=new Set();connMap[hovN].forEach(e=>{if(activeEdges.includes(e)){hlE.add(e._i);hlN.add(e.source);hlN.add(e.target);}});}
  else if(hovE){hlN=new Set([hovE.source,hovE.target]);hlE=new Set([hovE._i]);}

  // Draw edges
  activeEdges.forEach(e=>{
    const p0=NP[e.source],p3=NP[e.target];if(!p0||!p3)return;
    const{cp1,cp2}=cpOf(p0,p3);
    const hHL=hlE?hlE.has(e._i):false;
    const mHL=mh?mh.hlEdges.has(e._i):false;
    const mDim=mh?mh.dimEdges.has(e._i):false;
    const hasHover=hovN||hovE,hasMajor=mh!==null;
    let al,lw,col;
    if(hasHover){
      if(hHL){al=0.9;lw=1.5+e.avg*2.2;col=eColor(e.avg);}
      else{al=0.015;lw=0.35;col=isDark?'#6a7090':'#9090aa';}
    } else if(hasMajor){
      if(mHL){al=0.75;lw=1.2+e.avg*2;col=eColor(e.avg);}
      else if(mDim){al=0.015;lw=0.3;col=isDark?'#6a7090':'#9090aa';}
      else{al=0.04+e.avg*.6;lw=0.4+e.avg*1.8;col=isDark?'#6a7090':'#9090aa';}
    } else {
      al=0.04+e.avg*.6;lw=0.4+e.avg*1.8;col=isDark?'#6a7090':'#9090aa';
    }
    cx.globalAlpha=al;cx.strokeStyle=col;cx.lineWidth=lw;
    cx.beginPath();cx.moveTo(p0.x,p0.y);cx.bezierCurveTo(cp1.x,cp1.y,cp2.x,cp2.y,p3.x,p3.y);cx.stroke();cx.globalAlpha=1;
  });

  // Draw nodes — dept color by default, type color when major active
  GD.nodes.forEach(n=>{
    const p=NP[n.id];if(!p)return;
    const isHov=hovN===n.id;
    const hasHover=hovN||hovE,hasMajor=mh!==null;
    const inHHL=hlN?hlN.has(n.id):false;
    const typeCol=mh?mh.hlNodes.get(n.id):null;
    const inMHL=typeCol!=null;
    const color=hasMajor?(inMHL?typeCol:colorOf(n.id)):colorOf(n.id);

    let nodeAl,ringW;
    if(hasHover){
      nodeAl=inHHL?1:0.1;
      ringW=isHov?1.8:0.8;
    } else if(hasMajor){
      nodeAl=inMHL?1:0.08;
      ringW=inMHL?1.6:0.5;
    } else {
      nodeAl=1;
      ringW=isHov?1.8:0.8;
    }

    cx.globalAlpha=nodeAl;
    const r=isHov?NR+2:NR;
    cx.beginPath();cx.arc(p.x,p.y,r,0,Math.PI*2);
    cx.fillStyle=color+(isDark?'25':'1e');cx.fill();
    cx.strokeStyle=color;cx.lineWidth=inMHL&&hasMajor?2:ringW;cx.stroke();
    cx.fillStyle=nodeAl>0.3?(isDark?'#d0cec4':'#1a1a1a'):(isDark?'#333':'#ddd');
    cx.font=(isHov||inMHL?'500':'400')+' 8.5px monospace';
    cx.textAlign='center';cx.fillText(n.id,p.x,p.y+3.5);cx.globalAlpha=1;
  });
}

function pct(v,max){return Math.round(Math.min(1,v/max)*100)+'%';}
function bar(v,max,color){return`<div class="ct-bar"><div class="ct-fill" style="width:${pct(v,max)};background:${color}"></div></div>`;}

function majorTagsFor(id){
  const cm=COURSE_MAJORS[id];if(!cm)return'';
  return Object.entries(cm).map(([m,t])=>`<span class="ct-tag" style="background:${TYPE_COLORS[t]||'#888'}22;color:${TYPE_COLORS[t]||'#888'};border:1px solid ${TYPE_COLORS[t]||'#888'}44">${m}: ${t}</span>`).join('');
}

function showNTip(id){
  const p=NP[id];
  const color=colorOf(id);
  const s=GD.nodes.find(n=>n.id===id)?.semester;
  const conns=connMap[id].filter(e=>activeEdges.includes(e));
  const top=[...conns].sort((a,b)=>b.avg-a.avg).slice(0,5);
  let h=`<div class="ct-title" style="color:${color}">${id}</div>`;
  h+=`<div class="ct-name">${name(id)}</div>`;
  h+=`<div class="ct-sub">Semester ${s} · ${deptOf(id)} · ${conns.length} visible connections</div>`;
  const tags=majorTagsFor(id);
  if(tags) h+=`<div style="margin-top:4px">${tags}</div>`;
  if(top.length){
    h+=`<div class="ct-sep"><div style="font-size:10px;color:#888;margin-bottom:5px">Top connections</div>`;
    top.forEach(e=>{
      const oth=e.source===id?e.target:e.source;
      h+=`<div style="margin-bottom:5px"><div class="ct-row" style="margin-top:0"><span class="ct-peer" style="min-width:58px;color:${colorOf(oth)}">${oth}</span>${bar(e.avg,.52,eColor(e.avg))}<span style="font-size:10px;min-width:34px;text-align:right">${e.avg.toFixed(3)}</span></div><div class="ct-peername">${name(oth)}</div></div>`;
    });
    h+=`</div>`;
  }
  tip.innerHTML=h;posTip(p.x,p.y);
}

function showETip(e){
  const sc=colorOf(e.source),tc=colorOf(e.target),ec=eColor(e.avg);
  const sp=NP[e.source]?.s||'',tp=NP[e.target]?.s||'';
  let h=`<div class="ct-title"><span style="color:${sc}">${e.source}</span><span style="color:#888"> → </span><span style="color:${tc}">${e.target}</span></div>`;
  h+=`<div class="ct-name"><span style="color:${sc}">${name(e.source)}</span><span style="color:#888"> → </span><span style="color:${tc}">${name(e.target)}</span></div>`;
  h+=`<div class="ct-sub">Sem ${sp} → Sem ${tp}</div>`;
  h+=`<div class="ct-row" style="margin-top:6px"><span style="font-size:11px;min-width:90px;color:#888">Avg similarity</span>${bar(e.avg,.52,ec)}<span style="font-weight:500;min-width:36px;text-align:right">${e.avg.toFixed(3)}</span></div>`;
  h+=`<div class="ct-row"><span style="font-size:11px;min-width:90px;color:#888">Max similarity</span>${bar(e.max,1,ec)}<span style="font-size:11px;min-width:36px;text-align:right">${e.max.toFixed(2)}</span></div>`;
  if(e.concepts?.length){h+=`<div class="ct-sep"><div style="font-size:10px;color:#888;margin-bottom:3px">Shared concepts</div>`;[...new Set(e.concepts)].slice(0,2).forEach(c=>{h+=`<div class="ct-c">· ${c}</div>`;});h+=`</div>`;}
  tip.innerHTML=h;const p0=NP[e.source],p3=NP[e.target];posTip((p0.x+p3.x)/2,(p0.y+p3.y)/2);
}

function posTip(lx,ly){
  tip.style.display='block';const tw=280,th=220;
  let tx=lx+18,ty=ly-22;
  if(tx+tw>W-8)tx=lx-tw-18;if(ty+th>H-8)ty=H-th-8;if(ty<8)ty=8;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}

function updateMeta(){
  document.getElementById('edge-count').textContent=activeEdges.length+' connections shown';
  const clearBtn=document.getElementById('clear-btn'),hint=document.getElementById('dept-hint');
  if(selMajors.size>0){
    clearBtn.style.display='';
    hint.textContent=[...selMajors].join(' + ')+' highlighted';
  } else {
    clearBtn.style.display='none';
    hint.textContent='Click a major to highlight its curriculum';
  }
}

// Build legend
function buildLegend(){
  const leg=document.getElementById('cg-leg');
  leg.innerHTML='';

  // Major buttons row
  const majorWrap=document.createElement('div');
  majorWrap.style.cssText='display:flex;flex-wrap:wrap;gap:8px;width:100%';
  ALL_MAJORS.forEach(m=>{
    const el=document.createElement('div');
    el.className='major-btn';el.dataset.major=m;
    el.innerHTML=`<div class="major-name">${m}</div>`;
    el.addEventListener('click',()=>{
      if(selMajors.has(m)){selMajors.delete(m);el.classList.remove('active');}
      else{selMajors.add(m);el.classList.add('active');}
      hovN=null;hovE=null;tip.style.display='none';updateMeta();draw();
    });
    majorWrap.appendChild(el);
  });
  leg.appendChild(majorWrap);

  // Course type legend row
  const typeRow=document.createElement('div');
  typeRow.style.cssText='display:flex;flex-wrap:wrap;gap:5px 14px;width:100%;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.08);margin-top:6px';
  typeRow.innerHTML='<div style="font-size:10px;color:#888;width:100%;margin-bottom:2px;font-weight:500">Course type (shown when major selected)</div>';
  Object.entries(TYPE_LABELS).forEach(([k,v])=>{
    typeRow.innerHTML+=`<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#888"><div style="width:10px;height:10px;border-radius:2px;background:${TYPE_COLORS[k]};flex-shrink:0"></div><span><strong style="color:${TYPE_COLORS[k]}">${k}</strong> — ${v}</span></div>`;
  });
  leg.appendChild(typeRow);
}

document.getElementById('thresh').addEventListener('input',function(){
  threshold=parseInt(this.value)/100;
  document.getElementById('thresh-val').textContent=threshold.toFixed(2);
  computeActiveEdges();updateMeta();draw();
});

document.getElementById('clear-btn').addEventListener('click',()=>{
  selMajors.clear();
  document.querySelectorAll('.major-btn.active').forEach(el=>el.classList.remove('active'));
  updateMeta();draw();
});

cv.addEventListener('mousemove',ev=>{
  const r=cv.getBoundingClientRect(),lx=ev.clientX-r.left,ly=ev.clientY-r.top;
  let fn=null;
  for(const n of GD.nodes){const p=NP[n.id];if(!p)continue;if(Math.hypot(lx-p.x,ly-p.y)<=NR+3){fn=n.id;break;}}
  let fe=null;
  if(!fn){let md=8;for(const e of activeEdges){const d=distEdge(lx,ly,e);if(d<md){md=d;fe=e;}}}
  const ch=fn!==hovN||fe!==hovE;hovN=fn;hovE=fe;
  if(fn)showNTip(fn);else if(fe)showETip(fe);else tip.style.display='none';
  if(ch)draw();
});
cv.addEventListener('mouseleave',()=>{hovN=null;hovE=null;tip.style.display='none';draw();});

document.getElementById('edge-toggle').addEventListener('change',function(){
  showEdges=this.checked;draw();
});

computeActiveEdges();initCv();buildLegend();draw();updateMeta();
window.addEventListener('resize',()=>{cx.setTransform(1,0,0,1,0,0);initCv();draw();});
</script>
</body>
</html>
